<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0f12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Лог генератора і двигунів</title>
<style>
  :root { --bg:#0e0f12; --panel:#181a1f; --border:#2a2d35; --text:#e4e6eb; --muted:#8a8f99; --green:#2ecc71; --red:#e74c3c; --accent:#3aa0ff; --amber:#f0a92e; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:16px; padding-top:max(16px,env(safe-area-inset-top)); padding-bottom:max(16px,env(safe-area-inset-bottom)); -webkit-font-smoothing:antialiased; }
  h1 { font-size:17px; margin:0 0 12px; font-weight:600; }
  /* перемикач одиниць */
  .units { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .unit-btn { flex:0 0 auto; background:var(--panel); border:1px solid var(--border); color:var(--muted); font-size:14px; font-weight:600; padding:10px 16px; border-radius:10px; cursor:pointer; white-space:nowrap; touch-action:manipulation; }
  .unit-btn.active { color:#fff; background:var(--accent); border-color:var(--accent); }
  /* статус мережі */
  .netbar { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:12px; min-height:18px; }
  .netbar .ndot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .netbar.busy .ndot { background:var(--amber); }
  .netbar.ok .ndot { background:var(--green); }
  .netbar.err .ndot { background:var(--red); }
  .netbar.err { color:var(--red); }
  .status { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; text-align:center; }
  .status-label { font-size:13px; color:var(--muted); margin-bottom:6px; }
  .status-value { font-size:22px; font-weight:700; }
  .status-value.on { color:var(--green); }
  .status-value.off { color:var(--muted); }
  .runtime { font-size:14px; color:var(--accent); margin-top:6px; font-variant-numeric:tabular-nums; }
  button.action { width:100%; border:none; border-radius:12px; padding:18px; font-size:18px; font-weight:700; color:#fff; cursor:pointer; margin-bottom:18px; transition:filter .15s; touch-action:manipulation; }
  button.action:active { filter:brightness(1.2); }
  button.action:disabled { opacity:.5; cursor:default; }
  button.start { background:var(--green); }
  button.stop { background:var(--red); }
  .tabs { display:flex; gap:4px; margin-bottom:16px; overflow-x:auto; -webkit-overflow-scrolling:touch; border-bottom:1px solid var(--border); }
  .tab { flex:0 0 auto; background:none; border:none; color:var(--muted); font-size:14px; font-weight:600; padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; touch-action:manipulation; }
  .tab.active { color:var(--text); border-bottom-color:var(--accent); }
  .panel { display:none; }
  .panel.active { display:block; }
  table { width:100%; border-collapse:collapse; font-size:13px; font-variant-numeric:tabular-nums; }
  th,td { padding:10px 6px; text-align:left; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; font-size:12px; }
  td.dur { color:var(--accent); font-weight:600; }
  td.running { color:var(--green); }
  td.actions { text-align:right; white-space:nowrap; }
  .icon-btn { background:none; border:none; cursor:pointer; font-size:16px; padding:4px 6px; color:var(--muted); touch-action:manipulation; }
  .icon-btn.del { color:var(--red); }
  .icon-btn.edit { color:var(--accent); }
  .empty { color:var(--muted); text-align:center; padding:24px 0; font-size:13px; }
  .section-sum { font-size:13px; color:var(--muted); margin:0 0 12px; }
  .section-sum b { color:var(--text); }
  .controls { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
  .controls button { flex:1; min-width:110px; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px; font-size:13px; cursor:pointer; touch-action:manipulation; }
  .controls button:active { background:var(--border); }
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; padding:16px; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px; width:100%; max-width:360px; }
  .modal h2 { font-size:16px; margin:0 0 16px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px; font-size:15px; }
  .field .hint { font-size:11px; color:var(--muted); margin-top:4px; }
  .modal-actions { display:flex; gap:8px; margin-top:18px; }
  .modal-actions button { flex:1; border:none; border-radius:8px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; touch-action:manipulation; }
  .btn-cancel { background:var(--border); color:var(--text); }
  .btn-save { background:var(--accent); color:#fff; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:90; align-items:center; justify-content:center; }
  .overlay.open { display:flex; }
  .spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <h1>Лог генератора і двигунів</h1>
  <div class="units" id="unitTabs"></div>
  <div class="netbar" id="netBar"><div class="ndot"></div><span id="netText">Підключення…</span></div>

  <div class="status">
    <div class="status-label">Стан</div>
    <div id="stateValue" class="status-value off">—</div>
    <div id="runtimeLive" class="runtime"></div>
  </div>
  <button id="toggleBtn" class="action start" disabled>Запуск</button>

  <div class="tabs">
    <button class="tab active" data-tab="today">Сьогодні</button>
    <button class="tab" data-tab="all">Усі записи</button>
    <button class="tab" data-tab="days">Дні</button>
    <button class="tab" data-tab="weeks">Тижні</button>
    <button class="tab" data-tab="months">Місяці</button>
  </div>
  <div class="panel active" id="panel-today"><p class="section-sum" id="sumToday"></p><table><thead><tr><th>Увімкнено</th><th>Вимкнено</th><th>Трив.</th><th></th></tr></thead><tbody id="bodyToday"></tbody></table><div class="empty" id="emptyToday">Сьогодні ще не вмикали</div></div>
  <div class="panel" id="panel-all"><p class="section-sum" id="sumAll"></p><table><thead><tr><th>Увімкнено</th><th>Вимкнено</th><th>Трив.</th><th></th></tr></thead><tbody id="bodyAll"></tbody></table><div class="empty" id="emptyAll">Записів ще немає</div></div>
  <div class="panel" id="panel-days"><table><thead><tr><th>День</th><th>Запусків</th><th>Час роботи</th></tr></thead><tbody id="bodyDays"></tbody></table><div class="empty" id="emptyDays">Немає даних</div></div>
  <div class="panel" id="panel-weeks"><table><thead><tr><th>Тиждень</th><th>Запусків</th><th>Час роботи</th></tr></thead><tbody id="bodyWeeks"></tbody></table><div class="empty" id="emptyWeeks">Немає даних</div></div>
  <div class="panel" id="panel-months"><table><thead><tr><th>Місяць</th><th>Запусків</th><th>Час роботи</th></tr></thead><tbody id="bodyMonths"></tbody></table><div class="empty" id="emptyMonths">Немає даних</div></div>

  <div class="controls">
    <button id="refreshBtn">Оновити з бази</button>
    <button id="exportCsvBtn">Експорт CSV</button>
  </div>

  <div class="modal-bg" id="modalBg"><div class="modal"><h2>Редагувати запис</h2>
    <div class="field"><label>Увімкнено</label><input type="datetime-local" id="editStart" step="1"></div>
    <div class="field"><label>Вимкнено</label><input type="datetime-local" id="editStop" step="1"><div class="hint">Залиш порожнім, якщо ще працює</div></div>
    <div class="modal-actions"><button class="btn-cancel" id="editCancel">Скасувати</button><button class="btn-save" id="editSave">Зберегти</button></div>
  </div></div>
  <div class="overlay" id="overlay"><div class="spinner"></div></div>
<script>
/* ===== НАЛАШТУВАННЯ ===== */
const API_URL = 'https://script.google.com/macros/s/AKfycbxs0JF2jEblTqm5IQOlKmI9fYk7f0KHHM8Ptw2xNZo4OABrVtSHGc-62ua7a2G7X75b/exec';

/* ===== стан ===== */
let units=[], currentUnit=null;
let store={};   // {unitName: [ {id,start,stop} ]}
let entries=[]; // записи поточної одиниці
let liveTimer=null, editingId=null, busy=false;

const p2=n=>String(n).padStart(2,'0');
function fmtDateTime(ts){const d=new Date(ts);return `${p2(d.getDate())}.${p2(d.getMonth()+1)}.${d.getFullYear()} ${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`;}
function fmtDuration(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return `${p2(h)}:${p2(m)}:${p2(sec)}`;}
function isRunning(){return entries.length>0&&entries[entries.length-1].stop==null;}
function dayKey(ts){const d=new Date(ts);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function dayLabel(ts){const d=new Date(ts);return `${p2(d.getDate())}.${p2(d.getMonth()+1)}.${d.getFullYear()}`;}
function monthKey(ts){const d=new Date(ts);return `${d.getFullYear()}-${p2(d.getMonth()+1)}`;}
function monthLabel(ts){const names=['січень','лютий','березень','квітень','травень','червень','липень','серпень','вересень','жовтень','листопад','грудень'];const d=new Date(ts);return `${names[d.getMonth()]} ${d.getFullYear()}`;}
function isoWeek(ts){const d=new Date(ts);d.setHours(0,0,0,0);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day+3);const firstThu=new Date(d.getFullYear(),0,4);const week=1+Math.round(((d-firstThu)/86400000-3+((firstThu.getDay()+6)%7))/7);return {year:d.getFullYear(),week};}
function weekKey(ts){const w=isoWeek(ts);return `${w.year}-W${p2(w.week)}`;}
function weekLabel(ts){const d=new Date(ts);const day=(d.getDay()+6)%7;const mon=new Date(d);mon.setDate(d.getDate()-day);mon.setHours(0,0,0,0);const sun=new Date(mon);sun.setDate(mon.getDate()+6);const w=isoWeek(ts);return `Тиж. ${w.week}: ${p2(mon.getDate())}.${p2(mon.getMonth()+1)}–${p2(sun.getDate())}.${p2(sun.getMonth()+1)}`;}
function isToday(ts){return dayKey(ts)===dayKey(Date.now());}

/* ===== мережа ===== */
function setNet(state,text){const bar=document.getElementById('netBar');bar.classList.remove('busy','ok','err');if(state)bar.classList.add(state);document.getElementById('netText').textContent=text;}
function showOverlay(v){document.getElementById('overlay').classList.toggle('open',v);}
function setBusy(v){busy=v;document.getElementById('toggleBtn').disabled=v||!currentUnit;showOverlay(v);}

async function apiGet(){
  setNet('busy','Завантаження…');
  const r=await fetch(API_URL,{method:'GET'});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||'GET error');
  return j;
}
async function apiPost(body){
  setNet('busy','Збереження…');
  // text/plain щоб уникнути CORS preflight на Apps Script
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||'POST error');
  return j;
}

/* ===== завантаження всієї бази ===== */
async function loadAll(){
  setBusy(true);
  try{
    const j=await apiGet();
    units=j.units; store=j.data||{};
    if(!currentUnit||units.indexOf(currentUnit)<0) currentUnit=units[0];
    renderUnitTabs();
    entries=(store[currentUnit]||[]).slice();
    renderAll();updateStatus();
    setNet('ok','База синхронізована');
  }catch(err){
    setNet('err','Помилка: '+err.message);
  }finally{ setBusy(false); }
}

/* ===== перемикач одиниць ===== */
function renderUnitTabs(){
  const c=document.getElementById('unitTabs');c.innerHTML='';
  units.forEach(u=>{
    const b=document.createElement('button');
    b.className='unit-btn'+(u===currentUnit?' active':'');
    b.textContent=u;
    b.onclick=()=>{ if(busy||u===currentUnit)return; currentUnit=u; entries=(store[u]||[]).slice(); renderUnitTabs(); renderAll(); updateStatus(); };
    c.appendChild(b);
  });
}

/* ===== рендер ===== */
function entryRow(e){const running=e.stop==null;const tr=document.createElement('tr');const durCell=running?`<td class="running">в роботі</td>`:`<td class="dur">${fmtDuration(e.stop-e.start)}</td>`;tr.innerHTML=`<td>${fmtDateTime(e.start)}</td><td>${running?'—':fmtDateTime(e.stop)}</td>`+durCell+`<td class="actions"><button class="icon-btn edit" data-edit="${e.id}">✎</button><button class="icon-btn del" data-del="${e.id}">×</button></td>`;return tr;}
function bindRowButtons(c){c.querySelectorAll('[data-del]').forEach(b=>{b.onclick=()=>deleteEntry(Number(b.dataset.del));});c.querySelectorAll('[data-edit]').forEach(b=>{b.onclick=()=>openEdit(Number(b.dataset.edit));});}
function renderToday(){const body=document.getElementById('bodyToday');body.innerHTML='';const list=entries.filter(e=>isToday(e.start)).sort((a,b)=>b.start-a.start);list.forEach(e=>body.appendChild(entryRow(e)));document.getElementById('emptyToday').style.display=list.length?'none':'block';let total=0;list.forEach(e=>{if(e.stop!=null)total+=e.stop-e.start;});document.getElementById('sumToday').innerHTML=list.length?`Запусків сьогодні: <b>${list.length}</b> · Час роботи: <b>${fmtDuration(total)}</b>`:'';bindRowButtons(body);}
function renderAllEntries(){const body=document.getElementById('bodyAll');body.innerHTML='';const list=[...entries].sort((a,b)=>b.start-a.start);list.forEach(e=>body.appendChild(entryRow(e)));document.getElementById('emptyAll').style.display=list.length?'none':'block';let total=0;list.forEach(e=>{if(e.stop!=null)total+=e.stop-e.start;});document.getElementById('sumAll').innerHTML=list.length?`Усього записів: <b>${list.length}</b> · Сумарний час: <b>${fmtDuration(total)}</b>`:'';bindRowButtons(body);}
function aggregate(keyFn,labelFn){const map=new Map();for(const e of entries){if(e.stop==null)continue;const k=keyFn(e.start);if(!map.has(k))map.set(k,{label:labelFn(e.start),count:0,total:0,sortTs:e.start});const o=map.get(k);o.count++;o.total+=e.stop-e.start;if(e.start>o.sortTs)o.sortTs=e.start;}return [...map.values()].sort((a,b)=>b.sortTs-a.sortTs);}
function renderAgg(bodyId,emptyId,keyFn,labelFn){const body=document.getElementById(bodyId);body.innerHTML='';const rows=aggregate(keyFn,labelFn);rows.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${r.label}</td><td>${r.count}</td><td class="dur">${fmtDuration(r.total)}</td>`;body.appendChild(tr);});document.getElementById(emptyId).style.display=rows.length?'none':'block';}
function renderAll(){renderToday();renderAllEntries();renderAgg('bodyDays','emptyDays',dayKey,dayLabel);renderAgg('bodyWeeks','emptyWeeks',weekKey,weekLabel);renderAgg('bodyMonths','emptyMonths',monthKey,monthLabel);}
function updateStatus(){const sv=document.getElementById('stateValue'),btn=document.getElementById('toggleBtn'),live=document.getElementById('runtimeLive');if(!currentUnit){sv.textContent='—';sv.className='status-value off';btn.disabled=true;return;}btn.disabled=busy;if(isRunning()){sv.textContent='Увімкнено';sv.className='status-value on';btn.textContent='Стоп';btn.className='action stop';startLive();}else{sv.textContent='Вимкнено';sv.className='status-value off';btn.textContent='Запуск';btn.className='action start';stopLive();live.textContent='';}}
function startLive(){stopLive();const tick=()=>{const e=entries[entries.length-1];if(e&&e.stop==null){document.getElementById('runtimeLive').textContent=fmtDuration(Date.now()-e.start);}};tick();liveTimer=setInterval(tick,1000);}
function stopLive(){if(liveTimer){clearInterval(liveTimer);liveTimer=null;}}

/* ===== вкладки ===== */
document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('panel-'+t.dataset.tab).classList.add('active');};});

/* ===== дії (пишуть у базу) ===== */
document.getElementById('toggleBtn').onclick=async()=>{
  if(busy||!currentUnit)return;
  setBusy(true);
  try{
    let resp;
    if(isRunning()){
      const e=entries[entries.length-1];
      resp=await apiPost({action:'update',unit:currentUnit,id:e.id,start:e.start,stop:Date.now()});
    }else{
      resp=await apiPost({action:'add',unit:currentUnit,start:Date.now(),stop:null});
    }
    store[currentUnit]=resp.data; entries=resp.data.slice();
    renderAll();updateStatus();
    setNet('ok','Збережено в базу');
  }catch(err){ setNet('err','Не збережено: '+err.message); alert('Помилка збереження: '+err.message); }
  finally{ setBusy(false); }
};

async function deleteEntry(id){
  if(busy)return;
  if(!confirm('Видалити цей запис?'))return;
  setBusy(true);
  try{
    const resp=await apiPost({action:'delete',unit:currentUnit,id});
    store[currentUnit]=resp.data; entries=resp.data.slice();
    renderAll();updateStatus(); setNet('ok','Видалено');
  }catch(err){ setNet('err',err.message); alert('Помилка: '+err.message); }
  finally{ setBusy(false); }
}

/* ===== редагування ===== */
function tsToInput(ts){const d=new Date(ts);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`;}
function inputToTs(v){if(!v)return null;const m=v.match(/(\d+)-(\d+)-(\d+)T(\d+):(\d+)(?::(\d+))?/);if(!m)return null;return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+(m[6]||0)).getTime();}
function openEdit(id){const e=entries.find(x=>x.id===id);if(!e)return;editingId=id;document.getElementById('editStart').value=tsToInput(e.start);document.getElementById('editStop').value=e.stop!=null?tsToInput(e.stop):'';document.getElementById('modalBg').classList.add('open');}
function closeEdit(){document.getElementById('modalBg').classList.remove('open');editingId=null;}
document.getElementById('editCancel').onclick=closeEdit;
document.getElementById('modalBg').onclick=(ev)=>{if(ev.target.id==='modalBg')closeEdit();};
document.getElementById('editSave').onclick=async()=>{
  const e=entries.find(x=>x.id===editingId);if(!e)return;
  const startTs=inputToTs(document.getElementById('editStart').value);
  const stopVal=document.getElementById('editStop').value;const stopTs=stopVal?inputToTs(stopVal):null;
  if(startTs==null){alert('Вкажи час увімкнення');return;}
  if(stopTs!=null&&stopTs<startTs){alert('Час вимкнення не може бути раніше за ввімкнення');return;}
  closeEdit(); setBusy(true);
  try{
    const resp=await apiPost({action:'update',unit:currentUnit,id:e.id,start:startTs,stop:stopTs});
    store[currentUnit]=resp.data; entries=resp.data.slice();
    renderAll();updateStatus(); setNet('ok','Збережено');
  }catch(err){ setNet('err',err.message); alert('Помилка: '+err.message); }
  finally{ setBusy(false); }
};

/* ===== інше ===== */
document.getElementById('refreshBtn').onclick=()=>{ if(!busy) loadAll(); };
document.getElementById('exportCsvBtn').onclick=()=>{let csv='start_ms;stop_ms;Увімкнено;Вимкнено;Тривалість\n';entries.forEach(e=>{csv+=`${e.start};${e.stop!=null?e.stop:''};${fmtDateTime(e.start)};${e.stop!=null?fmtDateTime(e.stop):''};${e.stop!=null?fmtDuration(e.stop-e.start):''}\n`;});const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${currentUnit||'log'}.csv`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);};

/* ===== старт ===== */
loadAll();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
